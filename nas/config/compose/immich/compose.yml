name: immich

services:
  immich-net:
    container_name: immich_net
    image: alpine:3.20
    command: ["sh", "-c", "sleep infinity"]
    extra_hosts:
      - "host.docker.internal:172.21.0.1"
    ports:
      - "${LAN_IP}:2283:2283"
      - "127.0.0.1:3003:3003"
    restart: always

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v3}
    network_mode: "service:immich-net"
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - ${EXTERNAL_PHOTOS_LOCATION}:/external/photos:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      DB_HOSTNAME: "127.0.0.1"
      REDIS_HOSTNAME: "127.0.0.1"
      IMMICH_MACHINE_LEARNING_URL: "${IMMICH_MACHINE_LEARNING_URL:-http://host.docker.internal:3004}"
    depends_on:
      - immich-net
      - redis
      - database
      - immich-machine-learning
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v3}
    network_mode: "service:immich-net"
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    depends_on:
      - immich-net
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    network_mode: "service:immich-net"
    depends_on:
      - immich-net
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    network_mode: "service:immich-net"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    depends_on:
      - immich-net
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:

networks:
  default:
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
