services:
  linux-iso-mirror:
    image: alpine:3.20
    container_name: linux-iso-mirror
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - ISO_SYNC_CRON=17 3 * * *
    volumes:
      - /data/media/iso-mirror:/isos
      - ./distros.tsv:/config/distros.tsv:ro
      - ./sync-isos.sh:/usr/local/bin/sync-isos.sh:ro
    command: >
      sh -c "apk add --no-cache curl ca-certificates &&
             echo \"$${ISO_SYNC_CRON} /usr/local/bin/sync-isos.sh >>/proc/1/fd/1 2>>/proc/1/fd/2\" > /etc/crontabs/root &&
             /usr/local/bin/sync-isos.sh &&
             crond -f -l 8"
