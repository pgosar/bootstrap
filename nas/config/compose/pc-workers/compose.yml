services:
  tdarr-node:
    container_name: tdarr-node-pc
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: unless-stopped
    ports:
      - "${PC_LAN_IP}:8268:8268"
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - UMASK_SET=002
      - nodeName=${PC_WORKER_NODE_NAME:-pc-gpu-worker}
      - serverURL=http://${NAS_LAN_IP}:8266
      - apiKey=${TDARR_API_KEY}
      - nodeType=mapped
      - pathTranslators=[{"server":"/media","node":"/media"},{"server":"/torrents","node":"/torrents"},{"server":"/temp","node":"/temp"}]
      - transcodegpuWorkers=1
      - transcodecpuWorkers=2
      - healthcheckgpuWorkers=1
      - healthcheckcpuWorkers=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${PC_MEDIA_MOUNT}:/media
      - ${PC_TORRENTS_MOUNT}:/torrents
      - ${PC_WORKER_APPDATA}/tdarr-node/configs:/app/configs
      - ${PC_WORKER_APPDATA}/tdarr-node/logs:/app/logs
      - ${PC_WORKER_APPDATA}/tdarr-node/transcode-cache:/temp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  immich-machine-learning-pc:
    container_name: immich_machine_learning_pc
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v3}-cuda
    restart: unless-stopped
    ports:
      - "${PC_LAN_IP}:3003:3003"
    environment:
      MACHINE_LEARNING_HOST: "0.0.0.0"
    volumes:
      - ${PC_WORKER_APPDATA}/immich-machine-learning/model-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
